name: Issue Events Workflow

on:
  issues:
    types:
      - opened
      - labeled

jobs:
  issue-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print issue information
        run: |
          echo "Issue Title: ${{ github.event.issue.title }}"
          echo "Issue Number: ${{ github.event.issue.number }}"
          echo "Action Type: ${{ github.event.action }}"
