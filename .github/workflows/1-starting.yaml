name: Label Created Workflow

on:
  label:
    types:
      - created

jobs:
  print-label:
    runs-on: ubuntu-latest

    steps:
      - name: Print label details
        run: |
          echo "New label created"
          echo "Label name: ${{ github.event.label.name }}"
          echo "Label color: ${{ github.event.label.color }}"
